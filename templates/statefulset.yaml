apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "openclaw.fullname" . }}
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") $ | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
        {{- if .Values.azureWorkloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openclaw.serviceAccountName" . }}
      # Auto-mount token when serviceAccount.role is set for kubectl access
      automountServiceAccountToken: {{ or (not (empty .Values.serviceAccount.role)) .Values.azureWorkloadIdentity.enabled }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-home-data
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command: ["/bin/sh", "/etc/openclaw/init-home.sh"]
          volumeMounts:
            - name: data
              mountPath: /home-data
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --bind
            - lan
            - --port
            - {{ .Values.openclaw.config.gateway.port | quote }}
          ports:
            - name: gateway
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            - name: novnc
              containerPort: 6080
              protocol: TCP
            {{- if .Values.ttyd.enabled }}
            - name: ttyd
              containerPort: {{ .Values.ttyd.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: DISPLAY
              value: ":99"
            - name: OPENCLAW_STATE_DIR
              value: "/home/vibe/.openclaw"
            # Node 22+ enables Happy Eyeballs (autoSelectFamily) by default.
            # When IPv6 is configured but unreachable, this causes ENETUNREACH
            # errors before IPv4 can connect (~900ms to api.telegram.org and
            # other external services). Force IPv4-first to avoid this.
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
            {{- if .Values.secrets.existingSecret }}
            # Messaging channel tokens from existing secret
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: DISCORD_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: SLACK_APP_TOKEN
                  optional: true
            - name: FEISHU_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: FEISHU_APP_ID
                  optional: true
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: FEISHU_APP_SECRET
                  optional: true
            - name: MSTEAMS_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: MSTEAMS_APP_ID
                  optional: true
            - name: MSTEAMS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: MSTEAMS_APP_PASSWORD
                  optional: true
            - name: MSTEAMS_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: MSTEAMS_TENANT_ID
                  optional: true
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: BRAVE_API_KEY
                  optional: true
            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: PERPLEXITY_API_KEY
                  optional: true
            # Gateway token from existing secret
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: OPENCLAW_GATEWAY_TOKEN
            {{- else }}
            # Messaging channel tokens from created secret
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: DISCORD_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: SLACK_APP_TOKEN
                  optional: true
            - name: FEISHU_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: FEISHU_APP_ID
                  optional: true
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: FEISHU_APP_SECRET
                  optional: true
            - name: MSTEAMS_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: MSTEAMS_APP_ID
                  optional: true
            - name: MSTEAMS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: MSTEAMS_APP_PASSWORD
                  optional: true
            - name: MSTEAMS_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: MSTEAMS_TENANT_ID
                  optional: true
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: BRAVE_API_KEY
                  optional: true
            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: PERPLEXITY_API_KEY
                  optional: true
            # Gateway token from created secret
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: OPENCLAW_GATEWAY_TOKEN
            {{- end }}
            {{- if .Values.litellm_external.enabled }}
            # External LiteLLM API key
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.litellmExternal.secretName" . }}
                  key: LITELLM_API_KEY
                  optional: true
            {{- end }}
            # Config file path
            - name: TTYD_ENABLED
              value: {{ .Values.ttyd.enabled | quote }}
            - name: TTYD_PORT
              value: {{ .Values.ttyd.port | quote }}
            - name: TTYD_BASE_PATH
              value: {{ .Values.ttyd.ingress.pathPrefix | quote }}
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/vibe/.openclaw/openclaw.json"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /ready
              port: gateway
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/vibe
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
            {{- range .Values.openclaw.skills.volumes }}
            - name: skills-{{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.sidecars }}
            {{- toYaml . | nindent 8 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "openclaw.configMapName" . }}
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else if and .Values.persistence.enabled (not .Values.persistence.useStatefulSetVolumeClaim) }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openclaw.pvcName" . }}
        {{- else if .Values.persistence.enabled }}
        # When using StatefulSet volumeClaimTemplates, don't create extra volume
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- range .Values.openclaw.skills.volumes }}
        - name: skills-{{ .name }}
          {{- omit . "name" "mountPath" | toYaml | nindent 10 }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) .Values.persistence.useStatefulSetVolumeClaim }}
  {{- if semverCompare ">=1.25-0" .Capabilities.KubeVersion.Version }}
  persistentVolumeClaimRetentionPolicy:
    {{- if eq .Values.persistence.retainPolicy "Delete" }}
    whenDeleted: Delete
    whenScaled: Delete
    {{- else }}
    whenDeleted: Retain
    whenScaled: Retain
    {{- end }}
  {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "openclaw.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
