apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.configMapName" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  {{- $litellmUrl := include "openclaw.litellmUrl" . }}
  {{- $litellmModel := include "openclaw.litellmModel" . }}
  {{- $litellmEnabled := include "openclaw.litellmEnabled" . | eq "true" }}
  {{- $litellmApiKey := "not-needed" }}
  {{- if .Values.litellm_external.enabled }}
  {{- $litellmApiKey = .Values.litellm_external.apiKey | default "not-needed" }}
  {{- end }}
  {{- $embeddingApiKey := .Values.litellm.secrets.embeddingApiKey }}
  {{- if and (or .Values.litellm.enabled .Values.litellm_external.enabled) (not $embeddingApiKey) }}
  {{- $litellmSecretName := include "openclaw.litellm.secretName" . }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $litellmSecretName }}
  {{- if and $existingSecret $existingSecret.data }}
  {{- $embeddingApiKey = (index $existingSecret.data "embeddingApiKey" | default "") }}
  {{- end }}
  {{- end }}
  openclaw.json: |
    {{- $config := deepCopy .Values.openclaw.config }}
    {{- if $litellmEnabled }}
    {{- $api := "openai-completions" }}
    {{- if contains "claude" $litellmModel }}
    {{- $api = "anthropic-messages" }}
    {{- else if hasPrefix "gpt" $litellmModel }}
    {{- $api = "openai-responses" }}
    {{- end }}
    {{- $model := dict "id" $litellmModel "name" $litellmModel "input" (list "text") "cost" (dict "input" 0 "output" 0 "cacheRead" 0 "cacheWrite" 0) "contextWindow" 200000 "maxTokens" 8192 }}
    {{- $provider := dict "baseUrl" $litellmUrl "apiKey" $litellmApiKey "api" $api "models" (list $model) }}
    {{- $_ := set $config "models" (dict "mode" "merge" "providers" (dict "litellm" $provider)) }}
    {{- $agentDefaults := dict "model" (dict "primary" (printf "litellm/%s" $litellmModel)) }}
    {{- if (dig "agents" "defaults" nil $config) }}
    {{- $agentDefaults = merge $agentDefaults (dig "agents" "defaults" (dict) $config) }}
    {{- end }}
    {{- $_ := set $config "agents" (dict "defaults" $agentDefaults) }}
    {{- end }}
    {{- /* Enable compaction for agent conversations */}}
    {{- $compaction := dict "reserveTokensFloor" (int 20000) "memoryFlush" (dict "enabled" true "softThresholdTokens" (int 4000)) }}
    {{- $agentsCurrent := dig "agents" (dict) $config }}
    {{- $defaultsCurrent := dig "defaults" (dict) $agentsCurrent }}
    {{- $_ := set $defaultsCurrent "compaction" $compaction }}
    {{- $_ := set $agentsCurrent "defaults" $defaultsCurrent }}
    {{- $_ := set $config "agents" $agentsCurrent }}
    {{- /* Enable memory search when LiteLLM (built-in or external) is enabled and
       embeddingApiKey is set. embeddingApiKey may come from values or from an
       existing Secret preserved via lookup, so upgrades don't silently disable
       memory search. Credentials remain in the LiteLLM Secret; openclaw only
       sees the LiteLLM service URL. */}}
    {{- if and (or .Values.litellm.enabled .Values.litellm_external.enabled) $embeddingApiKey }}
    {{- $memorySearch := dict
      "provider" (.Values.litellm.secrets.embeddingProvider | default "openai")
      "model" (dig "memorySearch" "model" "text-embedding-3-small" .Values.openclaw)
      "fallback" "openai"
      "remote" (dict
        "baseUrl" $litellmUrl
        "apiKey" ( $embeddingApiKey | default "not-needed")
        "headers" (dict)
        "batch" (dict "enabled" false "concurrency" (int 8))
      )
      "query" (dict "hybrid" (dict "enabled" true "vectorWeight" 0.7 "textWeight" 0.3 "candidateMultiplier" (int 4)))
      "cache" (dict "enabled" true "maxEntries" (int 50000))
      "experimental" (dict "sessionMemory" true)
      "sources" (list "memory" "sessions")
      "sync" (dict "watch" true "sessions" (dict "deltaBytes" (int 100000) "deltaMessages" (int 50)))
      "store" (dict "vector" (dict "enabled" true))
      "extraPaths" .Values.openclaw.memorySearch.extraPaths
    }}
    {{- $agentsMem := dig "agents" (dict) $config }}
    {{- $defaultsMem := dig "defaults" (dict) $agentsMem }}
    {{- $_ := set $defaultsMem "memorySearch" $memorySearch }}
    {{- $_ := set $agentsMem "defaults" $defaultsMem }}
    {{- $_ := set $config "agents" $agentsMem }}
    {{- end }}
    {{- /* Default tools profile to "full" so coding/system tools are always available */}}
    {{- $tools := dict "profile" "full" "sessions" (dict "visibility" "all") }}
    {{- /* Enable web search when Brave or Perplexity API key is configured */}}
    {{- if or .Values.secrets.braveApiKey .Values.secrets.perplexityApiKey }}
    {{- $webSearchProvider := "brave" }}
    {{- if .Values.secrets.perplexityApiKey }}
    {{- $webSearchProvider = "perplexity" }}
    {{- end }}
    {{- $_ := set $tools "web" (dict "search" (dict "enabled" true "provider" $webSearchProvider)) }}
    {{- end }}
    {{- $_ := set $config "tools" $tools }}
    {{- /* Auto-enable channel plugins when bot tokens are configured */}}
    {{- $pluginEntries := dict }}
    {{- $pluginsAllow := list }}
    {{- if .Values.secrets.telegramBotToken }}
    {{- $_ := set $pluginEntries "telegram" (dict "enabled" true) }}
    {{- end }}
    {{- if and .Values.secrets.slackBotToken .Values.secrets.slackAppToken }}
    {{- $_ := set $pluginEntries "slack" (dict "enabled" true) }}
    {{- end }}
    {{- if .Values.secrets.discordBotToken }}
    {{- $_ := set $pluginEntries "discord" (dict "enabled" true) }}
    {{- end }}
    {{- if and .Values.secrets.feishuAppId .Values.secrets.feishuAppSecret }}
    {{- $_ := set $pluginEntries "feishu" (dict "enabled" true) }}
    {{- end }}
    {{- if and .Values.secrets.msteamsAppId .Values.secrets.msteamsAppPassword }}
    {{- $_ := set $pluginEntries "msteams" (dict "enabled" true) }}
    {{- end }}
    {{- /* Enable ACPX plugin when acpx.enabled is true */}}
    {{- if .Values.openclaw.acpx.enabled }}
    {{- $acpxConfig := dict
      "permissionMode" .Values.openclaw.acpx.permissionMode
      "nonInteractivePermissions" .Values.openclaw.acpx.nonInteractivePermissions
    }}
    {{- $_ := set $pluginEntries "acpx" (dict "enabled" true "config" $acpxConfig) }}
    {{- /* Explicitly allow the acpx plugin to suppress non-bundled plugin warnings */}}
    {{- $pluginsAllow = append $pluginsAllow "acpx" }}
    {{- $acp := dict
      "enabled" true
      "dispatch" (dict "enabled" .Values.openclaw.acpx.dispatch.enabled)
      "backend" .Values.openclaw.acpx.backend
      "defaultAgent" .Values.openclaw.acpx.defaultAgent
      "allowedAgents" .Values.openclaw.acpx.allowedAgents
      "maxConcurrentSessions" (.Values.openclaw.acpx.maxConcurrentSessions | int)
      "stream" (dict
        "coalesceIdleMs" (.Values.openclaw.acpx.stream.coalesceIdleMs | int)
        "maxChunkChars" (.Values.openclaw.acpx.stream.maxChunkChars | int)
      )
      "runtime" (dict
        "ttlMinutes" (.Values.openclaw.acpx.runtime.ttlMinutes | int)
      )
    }}
    {{- $_ := set $config "acp" $acp }}
    {{- end }}
    {{- if $pluginEntries }}
    {{- $pluginsDict := dict "entries" $pluginEntries }}
    {{- if $pluginsAllow }}
    {{- $_ := set $pluginsDict "allow" $pluginsAllow }}
    {{- end }}
    {{- /* Register bundled acpx plugin path so the gateway loads it without re-discovery */}}
    {{- if .Values.openclaw.acpx.enabled }}
    {{- $acpxPath := "/usr/local/share/npm-global/lib/node_modules/openclaw/extensions/acpx" }}
    {{- $_ := set $pluginsDict "load" (dict "paths" (list $acpxPath)) }}
    {{- $_ := set $pluginsDict "installs" (dict "acpx" (dict
      "source" "path"
      "spec" "acpx"
      "sourcePath" $acpxPath
      "installPath" $acpxPath
    )) }}
    {{- end }}
    {{- $_ := set $config "plugins" $pluginsDict }}
    {{- end }}
    {{- /* Fix Telegram connectivity on dual-stack (IPv4+IPv6) clusters.
       Node 22+ enables Happy Eyeballs (autoSelectFamily) by default, which
       causes ENETUNREACH when IPv6 is configured but unreachable. Disable
       autoSelectFamily at the config level so it applies to both gateway
       and embedded agent modes. */}}
    {{- $channels := dig "channels" (dict) $config }}
    {{- $telegram := dig "telegram" (dict) $channels }}
    {{- $network := dig "network" (dict) $telegram }}
    {{- $_ := set $network "autoSelectFamily" false }}
    {{- $_ := set $telegram "network" $network }}
    {{- /* Enable partial streaming for real-time response preview in Telegram.
       OpenClaw ≥ new-version defaults to "partial", but we set it explicitly
       so the chart behaves consistently regardless of upstream default changes. */}}
    {{- $_ := set $telegram "streaming" "partial" }}
    {{- /* Support tokenFile for Telegram (reads bot token from file instead of env var) */}}
    {{- if .Values.secrets.telegramTokenFile }}
    {{- $_ := set $telegram "tokenFile" .Values.secrets.telegramTokenFile }}
    {{- end }}
    {{- $_ := set $channels "telegram" $telegram }}
    {{- /* When Slack is enabled, default replyToMode to "all" so bot replies
       are threaded under the original message. */}}
    {{- if hasKey $pluginEntries "slack" }}
    {{- $slackConf := dig "slack" (dict) $channels }}
    {{- $_ := set $slackConf "replyToMode" "all" }}
    {{- $_ := set $channels "slack" $slackConf }}
    {{- end }}
    {{- /* Apply DM access control (dmPolicy + allowFrom) to enabled channels.
       When policy differs from default ("pairing"), set dmPolicy explicitly.
       When allowFrom is non-empty, set both dmPolicy and allowFrom. */}}
    {{- $dmPolicy := dig "dmAccess" "policy" "pairing" .Values.openclaw }}
    {{- $dmAllowFrom := dig "dmAccess" "allowFrom" (dict) .Values.openclaw }}
    {{- range $chName := list "slack" "telegram" "discord" "feishu" "msteams" }}
    {{- $chAllowFrom := dig $chName (list) $dmAllowFrom }}
    {{- if or $chAllowFrom (and (ne $dmPolicy "pairing") (hasKey $pluginEntries $chName)) }}
    {{- $chConf := dig $chName (dict) $channels }}
    {{- $_ := set $chConf "dmPolicy" $dmPolicy }}
    {{- if $chAllowFrom }}
    {{- $_ := set $chConf "allowFrom" $chAllowFrom }}
    {{- end }}
    {{- $_ := set $channels $chName $chConf }}
    {{- end }}
    {{- end }}
    {{- $_ := set $config "channels" $channels }}
    {{- /* Merge skills.load config (extraDirs, watch, watchDebounceMs) into openclaw.json.
       Combines manually specified extraDirs with auto-generated paths from skills.volumes. */}}
    {{- $skillsExtraDirs := .Values.openclaw.skills.load.extraDirs | default list }}
    {{- range .Values.openclaw.skills.volumes }}
    {{- $skillsExtraDirs = append $skillsExtraDirs .mountPath }}
    {{- end }}
    {{- if or $skillsExtraDirs (not .Values.openclaw.skills.load.watch) (ne (int .Values.openclaw.skills.load.watchDebounceMs) 250) }}
    {{- $skillsLoad := dict
      "extraDirs" $skillsExtraDirs
      "watch" .Values.openclaw.skills.load.watch
      "watchDebounceMs" (int .Values.openclaw.skills.load.watchDebounceMs)
    }}
    {{- $_ := set $config "skills" (dict "load" $skillsLoad) }}
    {{- end }}
    {{- /* Relax auth when Tailscale is enabled (access via HTTP on Tailscale IP) */}}
    {{- if .Values.tailscale.enabled }}
    {{- $gw := dig "gateway" (dict) $config }}
    {{- $cui := dig "controlUi" (dict) $gw }}
    {{- $_ := set $cui "allowInsecureAuth" true }}
    {{- $_ := set $cui "dangerouslyDisableDeviceAuth" true }}
    {{- $_ := set $gw "controlUi" $cui }}
    {{- $_ := set $config "gateway" $gw }}
    {{- end }}
{{ $config | toPrettyJson | indent 4 }}
  codex-config.toml: |
    # Codex CLI Configuration
    # This configuration uses LiteLLM as the model provider gateway
    model = {{ $litellmModel | quote }}
    model_provider = "litellm"
    model_verbosity = "medium"
    approval_policy = "never"
    sandbox_mode = "workspace-write"
    model_reasoning_effort = "high"
    suppress_unstable_features_warning = true
    web_search = "disabled"

    [features]
    skills = true
    unified_exec = true
    shell_snapshot = true
    multi_agent = true
    steer = true
    collaboration_modes = true
    personality = true

    [sandbox_workspace_write]
    network_access = true

    # Model providers (LiteLLM proxy)
    [model_providers.litellm]
    name     = "LiteLLM"
    base_url = {{ $litellmUrl | quote }}
    http_headers = { "Authorization"= "Bearer {{ $litellmApiKey }}" }
    wire_api = "responses"
  claude-settings.json: |
    {
      "env": {
        "DISABLE_TELEMETRY": "1",
        "ANTHROPIC_AUTH_TOKEN": {{ $litellmApiKey | quote }},
        "ANTHROPIC_BASE_URL": {{ $litellmUrl | quote }},
        "ANTHROPIC_MODEL": {{ $litellmModel | quote }},
        "DISABLE_NON_ESSENTIAL_MODEL_CALLS": "1",
        "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS": "1",
        "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": "1",
        "CLAUDE_CODE_ATTRIBUTION_HEADER": "0"
      },
      "model": {{ .Values.litellm.model | quote }},
      "alwaysThinkingEnabled": true,
      "permissions": {
        "allow": [
          "Skill(codex-skill)",
          "Skill(claude-code-settings:codex-skill)",
          "Skill(nanobanana-skill)",
          "Skill(claude-code-settings:nanobanana-skill)",
          "Skill(youtube-transcribe-skill)",
          "Skill(claude-code-settings:youtube-transcribe-skill)",
          "Skill(autonomous-skill)",
          "Skill(claude-code-settings:autonomous-skill)",
          "Bash(codex:*)"
        ],
        "deny": ["Bash(rm -rf:*)", "Bash(rm -fr:*)"],
        "ask": [
          "Bash(sudo:*)",
          "Bash(chmod 777:*)",
          "Bash(git push --force:*)",
          "Bash(git push -f:*)",
          "Bash(git reset --hard:*)",
          "Bash(git clean -fd:*)",
          "Bash(npm publish:*)",
          "Bash(eval:*)",
          "Read(.env)",
          "Read(.env.*)",
          "Read(**/.env)",
          "Read(**/.env.*)",
          "Read(~/.ssh/**)",
          "Read(~/.aws/**)",
          "Read(**/*credential*)",
          "Read(**/*secret*)",
          "Read(**/*.pem)",
          "Read(**/*.key)"
        ]
      }
    }
  {{- if .Values.openclaw.acpx.enabled }}
  acpx-config.json: |
    {{- $acpxAgents := dict }}
    {{- range $name, $agent := .Values.openclaw.acpx.agents }}
    {{- $_ := set $acpxAgents $name $agent }}
    {{- end }}
{{ dict "agents" $acpxAgents | toPrettyJson | indent 4 }}
  {{- end }}
  init-home.sh: |
{{ .Files.Get "configs/init-home.sh" | indent 4 }}
