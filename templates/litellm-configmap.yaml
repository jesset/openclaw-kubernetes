{{- if .Values.litellm.enabled }}
{{- $embeddingApiKey := .Values.litellm.secrets.embeddingApiKey }}
{{- if not $embeddingApiKey }}
{{- $litellmSecretName := include "openclaw.litellm.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $litellmSecretName }}
{{- if and $existingSecret $existingSecret.data }}
{{- $embeddingApiKey = (index $existingSecret.data "embeddingApiKey" | default "") }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.litellm.configMapName" . }}
  labels:
    {{- include "openclaw.litellm.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.litellm.configOverride }}
    {{- .Values.litellm.configOverride | nindent 4 }}
    {{- else }}
    litellm_settings:
      drop_params: true
    model_list:
    {{- if eq .Values.litellm.secrets.provider "github_copilot" }}
    - model_name: text-embedding-ada-002
      model_info:
        mode: embedding
      litellm_params:
        model: github_copilot/text-embedding-ada-002
        drop_params: true
        extra_headers:
          editor-version: "vscode/1.95.0"
          editor-plugin-version: "copilot-chat/0.26.7"
    - model_name: {{ .Values.litellm.model | quote }}
      {{- if hasPrefix "gpt" .Values.litellm.model }}
      model_info:
        mode: responses
        supports_vision: true
      {{- end }}
      litellm_params:
        model: {{ printf "github_copilot/%s" .Values.litellm.model | quote }}
        drop_params: true
        extra_headers:
          editor-version: "vscode/1.95.0"
          editor-plugin-version: "copilot-chat/0.26.7"
    {{- range .Values.litellm.extraModels }}
    {{- $extraName := "" }}
    {{- $extraInfo := dict }}
    {{- if kindIs "string" . }}
    {{- $extraName = . }}
    {{- else }}
    {{- $extraName = required "litellm.extraModels map entries must set a non-empty model_name" .model_name }}
    {{- $extraInfo = .model_info | default dict }}
    {{- end }}
    - model_name: {{ $extraName | quote }}
      {{- if $extraInfo }}
      model_info:
        {{- $extraInfo | toYaml | nindent 8 }}
      {{- else if hasPrefix "gpt" $extraName }}
      model_info:
        mode: responses
        supports_vision: true
      {{- end }}
      litellm_params:
        model: {{ printf "github_copilot/%s" $extraName | quote }}
        drop_params: true
        extra_headers:
          editor-version: "vscode/1.95.0"
          editor-plugin-version: "copilot-chat/0.26.7"
    {{- end }}
    - model_name: "*"
      litellm_params:
        model: "github_copilot/*"
        drop_params: true
        extra_headers:
          editor-version: "vscode/1.95.0"
          editor-plugin-version: "copilot-chat/0.26.7"
    {{- else }}
    - model_name: {{ .Values.litellm.model | quote }}
      litellm_params:
        model: {{ printf "%s/%s" .Values.litellm.secrets.provider .Values.litellm.model | quote }}
        drop_params: true
        api_key: "os.environ/apiKey"
        {{- if .Values.litellm.secrets.apiBase }}
        api_base: {{ .Values.litellm.secrets.apiBase | quote }}
        {{- end }}
    {{- range .Values.litellm.extraModels }}
    {{- $extraName := "" }}
    {{- $extraInfo := dict }}
    {{- if kindIs "string" . }}
    {{- $extraName = . }}
    {{- else }}
    {{- if not .model_name }}
    {{- fail "litellm.extraModels map-style entries must set model_name" }}
    {{- end }}
    {{- $extraName = .model_name }}
    {{- $extraInfo = .model_info | default dict }}
    {{- end }}
    - model_name: {{ $extraName | quote }}
      {{- if $extraInfo }}
      model_info:
        {{- $extraInfo | toYaml | nindent 8 }}
      {{- end }}
      litellm_params:
        model: {{ printf "%s/%s" $.Values.litellm.secrets.provider $extraName | quote }}
        drop_params: true
        api_key: "os.environ/apiKey"
        {{- if $.Values.litellm.secrets.apiBase }}
        api_base: {{ $.Values.litellm.secrets.apiBase | quote }}
        {{- end }}
    {{- end }}
    - model_name: "*"
      litellm_params:
        model: {{ printf "%s/*" .Values.litellm.secrets.provider | quote }}
        drop_params: true
        api_key: "os.environ/apiKey"
        {{- if .Values.litellm.secrets.apiBase }}
        api_base: {{ .Values.litellm.secrets.apiBase | quote }}
        {{- end }}
    {{- end }}
    {{- /* Embedding model for memory search — credentials stay in the Secret.
       Skip for github_copilot: embedding model is already defined above with Copilot auth. */}}
    {{- if and $embeddingApiKey (ne .Values.litellm.secrets.provider "github_copilot") }}
    - model_name: {{ .Values.openclaw.memorySearch.model | quote }}
      model_info:
        mode: embedding
      litellm_params:
        model: {{ printf "%s/%s" (.Values.litellm.secrets.embeddingProvider | default "openai") .Values.openclaw.memorySearch.model | quote }}
        api_key: "os.environ/embeddingApiKey"
        {{- if .Values.litellm.secrets.embeddingApiBase }}
        api_base: "os.environ/embeddingApiBase"
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
