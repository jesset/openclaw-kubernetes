# Default values for openclaw.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas for the OpenClaw gateway
# Note: Typically should be 1 as OpenClaw maintains state
replicaCount: 1

# -- Docker image configuration
image:
  # -- Image repository
  repository: ghcr.io/feiskyer/openclaw-gateway
  # -- Image pull policy
  pullPolicy: Always
  # -- Image tag (defaults to chart appVersion if not set)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- String to override the default name
nameOverride: ""

# -- String to override the default fullname
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use (BYO service account).
  # If set, no ClusterRoleBinding is created (user manages RBAC externally).
  # If not set and create is true, a name is generated using the fullname template.
  name: ""
  # -- Bind service account to a built-in Kubernetes ClusterRole for kubectl access.
  # Options: "" (none), "view" (read-only), "cluster-admin" (full access)
  # Only applies when using chart-created service account (name is not set).
  # When set, automounts the service account token automatically.
  role: "view"

# -- Azure Workload Identity configuration
# Enables Azure AD workload identity for the pod, allowing passwordless
# access to Azure resources (Key Vault, Storage, etc.) via managed identity.
# Requires: AKS cluster with OIDC issuer and workload identity enabled,
# plus a federated credential linking the managed identity to this service account.
azureWorkloadIdentity:
  # -- Enable Azure Workload Identity
  enabled: false
  # -- Client ID of the User-Assigned Managed Identity
  clientId: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 1024
  fsGroupChangePolicy: "OnRootMismatch"
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  capabilities: {}
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1024
  allowPrivilegeEscalation: true
  seccompProfile:
    type: RuntimeDefault

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 18789
  # -- Target port on the container
  targetPort: 18789
  # -- NodePort (only used when service.type is NodePort)
  nodePort: null
  # -- Service annotations
  annotations: {}

# -- Ingress configuration
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Additional annotations for the ingress
  # WebSocket support annotations for common ingress controllers
  annotations:
    # nginx ingress controller
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # traefik ingress controller (alternative)
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
  # -- Ingress hosts
  hosts:
    - host: openclaw.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  # -- TLS configuration
  tls: []
  #  - secretName: openclaw-tls
  #    hosts:
  #      - openclaw.local

# -- noVNC configuration (remote desktop access via browser)
novnc:
  ingress:
    # -- Enable noVNC ingress routes (requires ingress.enabled)
    # Creates two additional ingress resources:
    #   1. Web assets: <pathPrefix>/(.*) -> rewrite to /$1 on port 6080
    #   2. WebSocket: /websockify -> websockify (port 6080)
    # Note: path rewriting uses nginx.ingress.kubernetes.io/rewrite-target,
    # which requires the nginx ingress controller. Other controllers (Traefik,
    # HAProxy, etc.) need different rewrite mechanisms and are not supported
    # out of the box.
    enabled: false
    # -- URL path prefix for the noVNC web UI (e.g. /vnc/vnc.html)
    pathPrefix: /vnc

# -- ttyd configuration (web-based terminal access via browser)
ttyd:
  # -- Enable ttyd web terminal
  enabled: true
  # -- Port ttyd listens on inside the container
  port: 7681
  ingress:
    # -- Enable ttyd ingress route (requires ingress.enabled)
    enabled: false
    # -- URL path prefix for the ttyd web terminal
    pathPrefix: /ttyd/

# -- Tailscale configuration (mesh VPN for secure access without public ports)
# When enabled, each StatefulSet pod registers as a unique device on the
# Tailscale network. Access pods via their Tailscale hostname or IP.
# Requires a Tailscale auth key from https://login.tailscale.com/admin/settings/keys
tailscale:
  # -- Enable Tailscale mesh VPN
  enabled: false
  # -- Hostname prefix on the Tailscale network.
  # Each pod appends its StatefulSet ordinal: <hostname>-0, <hostname>-1, etc.
  # If empty, uses the pod name directly (e.g. openclaw-0).
  hostname: ""
  # -- Extra arguments passed to `tailscale up`.
  # Example: "--advertise-routes=10.96.0.0/12" for subnet routing.
  # Note: Subnet routing requires kernel networking (userspace: false)
  # and NET_ADMIN capability (add to securityContext.capabilities.add).
  extraArgs: ""
  # -- Accept DNS configuration from the Tailscale network
  acceptDns: false
  # -- Use userspace networking (no TUN device, no NET_ADMIN needed).
  # Default is false (kernel networking) which creates a real TUN interface,
  # making services directly reachable via the Tailscale IP.
  # Kernel networking requires NET_ADMIN capability (added automatically by the chart).
  userspace: false
  # -- Tailscale Serve configuration (HTTPS proxy via Tailscale certificates)
  serve:
    # -- Enable `tailscale serve` to proxy the gateway with Tailscale HTTPS.
    # Not required for kernel networking (default) since the TUN interface
    # makes services directly reachable. Useful for HTTPS with auto-certs.
    enabled: false
    # -- Port to proxy (defaults to gateway port)
    port: ""

# -- Resource requests and limits
resources:
  # -- Resource limits
  limits:
    cpu: 2000m
    memory: 8Gi
  # -- Resource requests
  requests:
    cpu: 250m
    memory: 1Gi

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 3
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80
  # -- Custom metrics for HPA
  metrics: []
  # -- Scaling behavior configuration
  behavior: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Pod topology spread constraints
topologySpreadConstraints: []

# -- Extra environment variables
extraEnv: []
  # - name: EXTRA_VAR
  #   value: "extra-value"

# -- Extra environment variables from secrets/configmaps
extraEnvFrom: []
  # - secretRef:
  #     name: my-secret

# -- Extra volume mounts for the container
extraVolumeMounts: []
  # - name: extra-volume
  #   mountPath: /extra

# -- Extra volumes for the pod
extraVolumes: []
  # - name: extra-volume
  #   persistentVolumeClaim:
  #     claimName: extra-pvc

# -- Init containers
initContainers: []

# -- Sidecar containers
sidecars: []

# -- Persistent Volume configuration
persistence:
  # -- Enable persistent storage
  enabled: true
  # -- Storage class name (empty for default)
  storageClass: ""
  # -- Access mode for the PVC
  accessMode: ReadWriteOnce
  # -- Size of the persistent volume
  size: 100Gi
  # -- Existing PVC to use (if set, StatefulSet will use this instead of creating new PVCs)
  existingClaim: ""
  # -- Annotations for the PVC
  annotations: {}
  # -- Retain policy for the PVC
  retainPolicy: Retain
  # -- Use StatefulSet volumeClaimTemplates (default: true)
  useStatefulSetVolumeClaim: true

# -- OpenClaw configuration
openclaw:
  # -- OpenClaw gateway configuration (openclaw.json content)
  config:
    # -- Gateway server configuration
    gateway:
      port: 18789
      controlUi:
        dangerouslyAllowHostHeaderOriginFallback: true
        dangerouslyDisableDeviceAuth: true
    logging:
      level: "info"
    # -- Agent defaults
    agents:
      defaults:
        verboseDefault: "on"
    # -- Browser configuration for headed Chrome (GUI visible via noVNC)
    browser:
      enabled: true
      remoteCdpTimeoutMs: 1500
      remoteCdpHandshakeTimeoutMs: 3000
      color: "#FF4500"
      executablePath: "/usr/bin/google-chrome"
      headless: false
      noSandbox: true
      attachOnly: true
      defaultProfile: "openclaw"
      profiles:
        openclaw:
          cdpPort: 18800
          color: "#FF4500"
  # -- DM access control for messaging channels.
  # Controls who can send direct messages to the bot.
  dmAccess:
    # -- Default DM policy applied to all enabled channels.
    # Options: pairing (default), allowlist, open, disabled.
    # Only applied when different from default ("pairing") or when
    # allowFrom is non-empty for a channel.
    policy: "pairing"
    # -- Per-channel DM allow lists. Users listed here are pre-approved
    # for DM access and bypass the manual pairing approval flow.
    # Use platform-specific user identifiers.
    allowFrom:
      # -- Slack user IDs (e.g. ["U0C8DG5A5", "U053FP6RAMA"])
      slack: []
      # -- Telegram user IDs (e.g. ["tg:123456789", "@username"])
      telegram: []
      # -- Discord user IDs (e.g. ["123456789012345678"])
      discord: []
      # -- Feishu user IDs
      feishu: []
      # -- MS Teams user IDs
      msteams: []

  # -- Memory search configuration (semantic search over conversation history)
  # Enabled when litellm.secrets.embeddingApiKey is set AND either litellm.enabled
  # or litellm_external.enabled is true. Credentials are kept in the LiteLLM Secret;
  # openclaw.json only sees the LiteLLM service URL with a dummy key.
  memorySearch:
    # -- Embedding model
    model: "text-embedding-3-small"
    # -- Extra paths to index for memory search
    extraPaths: []

  # -- ACPX plugin configuration (Agent Communication Protocol eXtensions).
  # acpx is bundled with openclaw — no separate installation needed.
  # See https://docs.openclaw.ai/tools/acp-agents for full documentation.
  acpx:
    # -- Enable ACPX plugin and ACP configuration
    enabled: true
    # -- ACP dispatch configuration (enables agent-to-agent communication)
    dispatch:
      enabled: true
    # -- ACP backend implementation
    backend: "acpx"
    # -- Default agent for ACP requests
    defaultAgent: "claude"
    # -- Agents allowed for ACP sessions
    allowedAgents:
      - claude
      - codex
    # -- Maximum number of concurrent ACP sessions
    maxConcurrentSessions: 8
    # -- Stream coalescing settings for real-time output
    stream:
      coalesceIdleMs: 300
      maxChunkChars: 1200
    # -- Session runtime defaults
    runtime:
      ttlMinutes: 120
    # -- ACPX plugin permission mode (approve-all, approve-reads, or deny-all)
    permissionMode: "approve-all"
    # -- How to handle permission prompts without a TTY (fail or deny).
    # "deny" allows graceful degradation; "fail" aborts the session on prompts.
    nonInteractivePermissions: "deny"
    # -- Per-agent command overrides for ~/.acpx/config.json.
    # Use this to pin specific ACP adapter packages or custom commands.
    agents:
      codex:
        command: "npx @zed-industries/codex-acp@0.9.2"

  # -- External skills loading configuration.
  # Load additional skills from directories outside the default paths.
  skills:
    load:
      # -- Additional directories to load skills from.
      # Each path must follow the structure: <dir>/<skill-name>/SKILL.md
      # These are lowest priority — workspace and managed skills take precedence.
      extraDirs: []
      # -- Watch skill files for changes (auto-reload on next agent turn)
      watch: true
      # -- Debounce time in ms for file change detection
      watchDebounceMs: 250
    # -- PVC volumes containing external skills.
    # Each entry mounts a volume and auto-appends its mountPath to extraDirs.
    # This is a convenience — you can also use extraVolumes/extraVolumeMounts
    # with manual extraDirs entries.
    volumes: []
    # - name: shared-skills
    #   mountPath: /skills/shared
    #   persistentVolumeClaim:
    #     claimName: shared-skills-pvc

# -- Secrets configuration
secrets:
  # -- Use existing secret instead of creating one
  existingSecret: ""
  # -- Secret annotations
  annotations: {}
  # -- Messaging channel tokens
  discordBotToken: ""
  telegramBotToken: ""
  slackBotToken: ""
  slackAppToken: ""
  # -- Feishu (Lark) channel credentials
  feishuAppId: ""
  feishuAppSecret: ""
  # -- Microsoft Teams channel credentials
  msteamsAppId: ""
  msteamsAppPassword: ""
  msteamsTenantId: ""
  # -- Web search API keys (enables tools.web.search when set)
  # Brave Search - structured results with free tier
  braveApiKey: ""
  # Perplexity - AI-synthesized answers with citations
  perplexityApiKey: ""
  # -- Tailscale auth key (from https://login.tailscale.com/admin/settings/keys)
  # Recommended: Reusable + Ephemeral. Required when tailscale.enabled is true.
  tailscaleAuthKey: ""
  # -- Gateway authentication token
  openclawGatewayToken: ""
  # -- Telegram bot token file path (alternative to telegramBotToken).
  # When set, the gateway reads the bot token from this file at startup.
  # More secure than env vars — token is not visible in pod specs.
  # The file must be mounted into the container (e.g. via extraVolumeMounts
  # from a Secret volume). Example: /etc/openclaw-secrets/telegram-bot-token
  telegramTokenFile: ""

# -- Liveness probe configuration
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 180
  timeoutSeconds: 180
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 6
  successThreshold: 1

# -- Startup probe configuration
startupProbe:
  enabled: false
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

# -- LiteLLM Proxy configuration
litellm:
  # -- Enable LiteLLM proxy deployment
  enabled: true
  # -- Number of replicas
  replicaCount: 1
  # -- LiteLLM image configuration
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-1.81.12-stable.3
    pullPolicy: IfNotPresent
  # -- Service configuration
  service:
    type: ClusterIP
    port: 4000
    targetPort: 4000
    annotations: {}
  # -- Resource requests and limits
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi
  # -- Primary model to proxy through LiteLLM (used as the default agent model)
  model: claude-opus-4.6
  # -- Additional models to register in LiteLLM, allowing model switching
  # without redeploying. Each entry can be a simple model name string or
  # a map with model_name and optional model_info fields.
  # Examples:
  #   extraModels:
  #     - claude-sonnet-4-20250514
  #     - gpt-4.1
  #     - model_name: o3
  #       model_info:
  #         mode: responses
  extraModels: []
  # -- LiteLLM provider and credentials
  secrets:
    # -- Model provider: github_copilot, anthropic, or openai
    provider: github_copilot
    # -- API key for the provider (not needed for github_copilot)
    apiKey: ""
    # -- API base URL (optional, for custom endpoints)
    apiBase: ""
    # -- API key for the embedding provider used by memory search
    # When set (together with litellm.enabled), memory search is enabled and
    # embedding requests are routed through LiteLLM so the key never appears
    # in openclaw.json (a plain ConfigMap).
    embeddingApiKey: ""
    # -- Base URL for the embedding provider (optional; omit for default OpenAI endpoint)
    embeddingApiBase: ""
    # -- Embedding provider name: openai, azure, cohere, etc. (used to build the
    # litellm_params model string, e.g. "openai/text-embedding-3-small")
    embeddingProvider: "openai"
  # -- Persistent storage for LiteLLM data (~/.config/litellm)
  persistence:
    # -- Enable persistent storage
    enabled: true
    # -- Storage class name (empty for default)
    storageClass: ""
    # -- Access mode for the PVC
    accessMode: ReadWriteOnce
    # -- Size of the persistent volume
    size: 1Gi
    # -- Mount path inside the container
    mountPath: /home/litellm/.config/litellm
    # -- Use an existing PVC instead of creating one
    existingClaim: ""
  # -- Extra environment variables
  extraEnv: []
  # -- Override the default LiteLLM config entirely
  # When set, replaces the built-in config in the ConfigMap template.
  # When empty, the default config (github_copilot models) is used.
  configOverride: ""

# -- Network Policy configuration
networkPolicy:
  # -- Enable network policies (blocks egress to cloud instance metadata service)
  enabled: false

# -- External LiteLLM Proxy configuration
# Use this when connecting to an externally deployed LiteLLM instance
# instead of deploying an internal one. Mutually exclusive with litellm.enabled.
litellm_external:
  # -- Enable external LiteLLM connection (mutually exclusive with litellm.enabled)
  enabled: false
  # -- External LiteLLM API base URL (e.g., "http://litellm.example.com:4000")
  apiBase: ""
  # -- API key for the external LiteLLM instance
  apiKey: ""
  # -- Model to use through the external LiteLLM
  model: ""

# -- Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable Pod Disruption Budget
  enabled: false
  # -- Minimum available pods (number or percentage)
  minAvailable: 1
  # -- Maximum unavailable pods (number or percentage)
  # maxUnavailable: 1
